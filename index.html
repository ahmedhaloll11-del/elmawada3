<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  const SW=`
    const CACHE='mawada-v5';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>fetch(self.location.href).then(r=>c.put(self.location.href,r)).catch(()=>{})));self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
    self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(cached=>{if(cached)return cached;return fetch(e.request).then(r=>{if(!r||r.status!==200||r.type==='opaque')return r;const c=r.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));return r;}).catch(()=>caches.match(self.location.href));}));});
  `;
  const blob=new Blob([SW],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(e=>console.warn('SW:',e));
})();

// PWA Install
var deferredPrompt=null,installBanner=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;showInstallBanner();});
window.addEventListener('appinstalled',()=>{hideInstallBanner();deferredPrompt=null;});
function showInstallBanner(){
  if(installBanner)return;
  installBanner=document.createElement('div');
  installBanner.innerHTML=`<div style="display:flex;align-items:center;gap:12px;direction:rtl;"><span style="font-size:34px;flex-shrink:0;">🐥</span><div style="flex:1;"><div style="font-weight:800;font-size:15px;margin-bottom:3px;">ثبّت التطبيق على شاشتك</div><div style="font-size:12px;color:#86EFAC;">اشتغل زي تطبيق حقيقي!</div></div><button onclick="installApp()" style="background:linear-gradient(135deg,#FCD34D,#F59E0B);color:#92400E;border:none;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:900;cursor:pointer;font-family:Cairo,sans-serif;flex-shrink:0;">تثبيت ⬇️</button><button onclick="hideBanner()" style="background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:9px;padding:10px 12px;font-size:16px;cursor:pointer;flex-shrink:0;">✕</button></div>`;
  Object.assign(installBanner.style,{position:'fixed',bottom:'86px',left:'50%',transform:'translateX(-50%)',width:'calc(100% - 24px)',maxWidth:'456px',background:'linear-gradient(135deg,#92400E,#B45309)',color:'#fff',padding:'14px 16px',borderRadius:'18px',zIndex:'9999',fontFamily:'Cairo,sans-serif',boxShadow:'0 10px 40px rgba(0,0,0,0.45)',border:'1.5px solid rgba(255,255,255,0.18)',animation:'bannerIn 0.4s cubic-bezier(0.32,0.72,0,1) both'});
  document.body.appendChild(installBanner);
  setTimeout(hideBanner,15000);
}
function hideInstallBanner(){if(installBanner){installBanner.remove();installBanner=null;}}
window.hideBanner=hideInstallBanner;
window.installApp=async function(){if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;hideInstallBanner();};
</script>

<script type="text/babel">

const {useState,useEffect,useCallback,useRef}=React;

/* ══ BIRDS ══ */
const BIRDS=[
  {id:"broiler",  name:"فراخ تسمين ابيض",short:"ابيض",    e:"🐥",bg:"#FEF3C7",brd:"#F59E0B",tx:"#92400E"},
  {id:"shafar",   name:"فراخ شفر",        short:"شفر",     e:"🐔",bg:"#D1FAE5",brd:"#10B981",tx:"#065F46"},
  {id:"hybrid",   name:"فراخ هجين صافي", short:"هجين",    e:"🐓",bg:"#DBEAFE",brd:"#3B82F6",tx:"#1E3A8A"},
  {id:"baladi",   name:"فراخ بلدي مشعر", short:"بلدي",    e:"🦤",bg:"#EDE9FE",brd:"#8B5CF6",tx:"#4C1D95"},
  {id:"muscovy",  name:"بط مسكوفي",       short:"مسكوفي",  e:"🦆",bg:"#DCFCE7",brd:"#22C55E",tx:"#14532D"},
  {id:"baghl",    name:"بط بغال",         short:"بغال",    e:"🦢",bg:"#E0F2FE",brd:"#0EA5E9",tx:"#0C4A6E"},
  {id:"sharifan", name:"بط شريفان",       short:"شريفان",  e:"🦅",bg:"#FED7AA",brd:"#F97316",tx:"#7C2D12"},
  {id:"faransawi",name:"بط فرنساوي",      short:"فرنساوي", e:"🦉",bg:"#FCE7F3",brd:"#EC4899",tx:"#831843"},
  {id:"quail",    name:"سمان",            short:"سمان",    e:"🐦",bg:"#FEF9C3",brd:"#EAB308",tx:"#713F12"},
];
const gb=id=>BIRDS.find(b=>b.id===id)||{name:id,short:id,e:"🐦",bg:"#F3F4F6",brd:"#9CA3AF",tx:"#374151"};

/* ══ HELPERS ══ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const now=()=>new Date().toISOString().slice(0,10);
const dSince=d=>!d?0:Math.floor((Date.now()-new Date(d).getTime())/86400000);
const fmtL=iso=>!iso?"—":new Date(iso).toLocaleDateString("ar-EG",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const fmtS=iso=>!iso?"بدون تاريخ":new Date(iso).toLocaleDateString("ar-EG",{weekday:"short",day:"numeric",month:"numeric"});
const fmt=n=>Number(n||0).toLocaleString("ar-EG");
const sugDates=()=>{const r=[];const d=new Date();for(let i=1;i<=21&&r.length<6;i++){d.setDate(d.getDate()+1);if([0,3].includes(d.getDay()))r.push(new Date(d).toISOString().slice(0,10));}return r;};

/* ══ STORAGE (Firebase + localStorage backup) ══ */
const SKEY="mawada_v5";

// حفظ: بيتحفظ في التليفون فوراً + السحابة في الخلفية
const persist=(d,setSyncState)=>{
  // 1) حفظ محلي فوري
  try{localStorage.setItem(SKEY,JSON.stringify(d));}catch{}
  // 2) حفظ سحابي
  if(setSyncState)setSyncState("saving");
  DOC_REF.set(d)
    .then(()=>{if(setSyncState)setSyncState("saved");setTimeout(()=>{if(setSyncState)setSyncState("ok");},2000);})
    .catch(e=>{console.warn("Cloud save failed:",e);if(setSyncState)setSyncState("offline");});
};

// تحميل: من السحابة أولاً، لو فشل من التليفون
const hydrate=async()=>{
  try{
    const doc=await DOC_REF.get();
    if(doc.exists){
      const data=doc.data();
      try{localStorage.setItem(SKEY,JSON.stringify(data));}catch{}
      return data;
    }
  }catch(e){console.warn("Cloud load failed, using local:",e);}
  // fallback للمحلي
  try{const r=localStorage.getItem(SKEY);return r?JSON.parse(r):null;}catch{return null;}
};

/* ══ COLORS ══ */
const LIGHT={
  bg:"#FFF8F0",card:"#FFFFFF",nav:"rgba(255,255,255,0.93)",
  pr:"#92400E",pr2:"#B45309",pr3:"#D97706",pr4:"#F59E0B",pr5:"#FCD34D",pr6:"#FEF3C7",
  txt:"#1C1917",sub:"#78350F",muted:"#A8A29E",bdr:"#FDE68A",bdr2:"#FCD34D",
  red:"#DC2626",redL:"#FEF2F2",grn:"#16A34A",grnL:"#F0FDF4",
  navBdr:"rgba(253,230,138,0.5)",navShadow:"0 -6px 28px rgba(0,0,0,.08)",
  cardShadow:"0 2px 16px rgba(0,0,0,.07)",cardBdr:"rgba(253,230,138,0.35)",
  hdrGrad:"linear-gradient(135deg,#92400E 0%,#B45309 55%,#D97706 100%)",
  bnrGrad:"linear-gradient(135deg,#92400E 0%,#B45309 55%,#D97706 100%)",
};
const DARK={
  bg:"#0B0A08",card:"#1C1910",nav:"rgba(15,14,10,0.93)",
  pr:"#F59E0B",pr2:"#D97706",pr3:"#B45309",pr4:"#92400E",pr5:"#78350F",pr6:"#1E1400",
  txt:"#FAF3E0",sub:"#FCD34D",muted:"#6B5E50",bdr:"#2D2215",bdr2:"#3D2E18",
  red:"#F87171",redL:"#1C0808",grn:"#34D399",grnL:"#081A0E",
  navBdr:"rgba(245,158,11,0.12)",navShadow:"0 -6px 28px rgba(0,0,0,.45)",
  cardShadow:"0 2px 20px rgba(0,0,0,.4)",cardBdr:"rgba(45,34,21,0.8)",
  hdrGrad:"linear-gradient(135deg,#1E1308 0%,#2A1B0E 55%,#361F0C 100%)",
  bnrGrad:"linear-gradient(135deg,#1E1308 0%,#2A1B0E 55%,#361F0C 100%)",
};
let C={...LIGHT};

/* ══ MICRO ══ */
const Badge=({ch,bg,color,style={}})=><span style={{display:"inline-flex",alignItems:"center",background:bg||C.pr6,color:color||C.pr,borderRadius:99,padding:"3px 11px",fontSize:12,fontWeight:800,lineHeight:1.4,...style}}>{ch}</span>;
const FL=({ch,req})=><div style={{fontSize:13,fontWeight:700,color:C.sub,marginBottom:7}}>{ch}{req&&<span style={{color:C.red}}> *</span>}</div>;
const Dvd=()=><div style={{height:1,background:C.bdr,margin:"0 16px",opacity:.7}}/>;
const Card=({children,style={}})=><div style={{background:C.card,borderRadius:18,padding:"16px",boxShadow:C.cardShadow,border:`1px solid ${C.cardBdr}`,...style}}>{children}</div>;

/* ══ CLOUD INDICATOR ══ */
const SyncBadge=({state})=>{
  const map={
    loading:{ico:"⏳",txt:"جاري التحميل...",clr:"#F59E0B",pulse:true},
    saving: {ico:"☁️",txt:"جاري الحفظ...",clr:"#3B82F6",pulse:true},
    saved:  {ico:"✅",txt:"محفوظ على السحابة",clr:"#10B981",pulse:false},
    ok:     {ico:"☁️",txt:"السحابة متصلة",clr:"#10B981",pulse:false},
    offline:{ico:"📵",txt:"محفوظ محلياً فقط",clr:"#F59E0B",pulse:false},
  };
  const s=map[state]||map.ok;
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.12)",borderRadius:99,padding:"4px 10px"}}>
      <span className={s.pulse?"pulsing":""} style={{fontSize:12}}>{s.ico}</span>
      <span style={{fontSize:10,color:"rgba(255,255,255,.85)",fontWeight:600}}>{s.txt}</span>
    </div>
  );
};

/* ══ BIRD GRID ══ */
const BirdGrid=({sel,onSel})=>(
  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
    {BIRDS.map(b=>{const s=sel===b.id;return(
      <button key={b.id} className="bird-chip" onClick={()=>onSel(b.id)}
        style={{background:s?b.brd:b.bg,borderColor:s?b.brd:`${b.brd}55`,boxShadow:s?`0 6px 18px ${b.brd}55`:"0 1px 6px rgba(0,0,0,.07)"}}>
        <span style={{fontSize:30}}>{b.e}</span>
        <span style={{fontSize:10,fontWeight:s?900:600,color:s?"#fff":b.tx,textAlign:"center",lineHeight:1.3}}>{b.short}</span>
      </button>
    );})}
  </div>
);

/* ══ BOOKING SHEET ══ */
const BookSheet=({onClose,onSave,edit=null,prices={}})=>{
  const [bid,setBid]=useState(edit?.birdId||"");
  const [name,setName]=useState(edit?.custName||"");
  const [phone,setPhone]=useState(edit?.phone||"");
  const [qty,setQty]=useState(edit?.qty?String(edit.qty):"");
  const [dep,setDep]=useState(edit?.deposit?String(edit.deposit):"");
  const [dd,setDd]=useState(edit?.delivDate||"");
  const [notes,setNotes]=useState(edit?.notes||"");
  const [err,setErr]=useState("");
  const [step,setStep]=useState(1);
  const sug=sugDates();
  const unitP=bid&&prices[bid]?Number(prices[bid]):0;
  const total=unitP&&qty?unitP*Number(qty):0;
  const next=()=>{
    if(!bid){setErr("اختر نوع الطير");return;}
    if(!name.trim()){setErr("اكتب اسم العميل");return;}
    if(!phone.trim()){setErr("رقم التليفون مطلوب");return;}

    if(!qty||+qty<=0){setErr("اكتب الكمية");return;}
    setErr("");setStep(2);
  };
  const doSave=()=>onSave({id:edit?.id||uid(),custName:name.trim(),phone:phone.trim(),birdId:bid,qty:+qty,deposit:+dep||0,delivDate:dd,notes:notes.trim(),status:"pending",callStatus:"none",createdAt:edit?.createdAt||now(),fus:edit?.fus||[]});
  const b=gb(bid);
  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,.75)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div className="su" onClick={e=>e.stopPropagation()}
        style={{width:"100%",maxWidth:480,background:C.card,borderRadius:"26px 26px 0 0",maxHeight:"94vh",overflowY:"auto",paddingBottom:34,border:`1px solid ${C.cardBdr}`,borderBottom:"none"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"13px 0 7px"}}><div style={{width:44,height:5,background:C.bdr2,borderRadius:99,opacity:.6}}/></div>
        <div style={{padding:"4px 22px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:22,fontWeight:900,color:C.pr}}>{edit?"✏️ تعديل الحجز":"🐥 حجز جديد"}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>الخطوة {step} من 2</div>
          </div>
          {step===2&&<button onClick={()=>setStep(1)} className="abtn" style={{background:C.pr6,color:C.pr,padding:"9px 15px",fontSize:13,border:`1px solid ${C.bdr}`}}>← رجوع</button>}
        </div>
        <div style={{height:4,background:C.bdr,margin:"0 22px 18px",borderRadius:99}}>
          <div style={{height:"100%",width:step===1?"50%":"100%",background:`linear-gradient(90deg,${C.pr4},${C.pr3})`,borderRadius:99,transition:"width .35s"}}/>
        </div>
        <div style={{padding:"0 22px"}}>
          {step===1&&<div className="fu">
            <FL ch="🐥 اختر نوع الطير" req/>
            <BirdGrid sel={bid} onSel={setBid}/>
            <div style={{height:16}}/>
            <FL ch="👤 اسم العميل" req/>
            <input className="ifield" value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: محمد أحمد" style={{marginBottom:12}}/>
            <div style={{background:C.redL,border:`2px solid ${C.red}44`,borderRadius:14,padding:"11px 15px",marginBottom:10}}>

/* ══ ORDER ROW ══ */
const ORow=({o,isLast,onDeliver,onDelete,onEdit,onCallStatus,prices})=>{
  const [exp,setExp]=useState(false);
  const b=gb(o.birdId);
  const unitP=prices[o.birdId]?Number(prices[o.birdId]):0;
  const total=unitP*Number(o.qty||0);
  const cs=o.callStatus||"none";
  const csInfo={answered:{label:"رد ✅",cls:"call-ans"},noAnswer:{label:"لم يرد ❌",cls:"call-no"},none:{label:"لم يُتصل بعد",cls:"call-none"}};
  return(
    <div className="orow" style={{background:C.card,borderRight:`4px solid ${cs==="answered"?"#10B981":cs==="noAnswer"?C.red:C.bdr2}`}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px"}}>
        <div style={{width:48,height:48,borderRadius:14,background:b.bg,border:`2.5px solid ${b.brd}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:24}}>{b.e}</span>
        </div>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setExp(x=>!x)}>
          <div style={{fontWeight:800,fontSize:15,color:C.txt}}>{o.custName}</div>
          <div style={{fontSize:12,color:C.sub,marginTop:1}}>
            <span style={{fontWeight:800,color:b.tx}}>{fmt(o.qty)} {b.short}</span>
            {o.deposit>0&&<span style={{color:C.pr3,marginRight:6}}>• عربون: {fmt(o.deposit)}ج</span>}
          </div>
          {total>0&&<div style={{fontSize:12,fontWeight:800,color:C.pr}}>💰 {fmt(total)} ج</div>}
          <span className={csInfo[cs].cls} style={{fontSize:10,fontWeight:700,borderRadius:20,padding:"2px 9px",display:"inline-block",marginTop:4}}>{csInfo[cs].label}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
          <a href={`tel:${o.phone}`} className="abtn" style={{background:`linear-gradient(135deg,${C.grn},#15803D)`,color:"#fff",padding:"9px 13px",fontSize:18,textDecoration:"none",borderRadius:11}}>📞</a>
          <button className="abtn" onClick={()=>onDeliver(o.id)} style={{background:C.grnL,color:C.grn,padding:"6px 10px",fontSize:10,border:`1.5px solid ${C.grn}55`,borderRadius:10}}>✅ استلم</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,padding:"0 16px 11px"}}>
        <span style={{fontSize:10,color:C.muted,alignSelf:"center",marginLeft:4,flexShrink:0}}>حالة الاتصال:</span>
        {[["answered","رد ✅","#D1FAE5","#10B981"],["noAnswer","لم يرد ❌","#FEE2E2","#EF4444"],["none","⏳ لم يُتصل","#FEF3C7","#D97706"]].map(([k,l,bg,co])=>(
          <button key={k} onClick={()=>onCallStatus(o.id,k)} className="abtn"
            style={{flex:1,padding:"6px 3px",fontSize:10,fontWeight:700,background:cs===k?bg:C.pr6,color:cs===k?co:C.muted,border:`1.5px solid ${cs===k?co:C.bdr}`,borderRadius:9,transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>
      {exp&&<div className="fu" style={{padding:"0 16px 13px",display:"flex",gap:7,flexWrap:"wrap"}}>
        <button className="abtn" onClick={()=>onEdit(o)} style={{background:C.pr6,color:C.pr,padding:"8px 14px",fontSize:12,border:`1px solid ${C.bdr}`}}>✏️ تعديل</button>
        {o.notes&&<div style={{width:"100%",fontSize:12,color:C.muted,background:C.pr6,borderRadius:10,padding:"8px 11px",border:`1px solid ${C.bdr}`}}>📝 {o.notes}</div>}
        <button className="abtn" onClick={()=>onDelete(o.id)} style={{background:C.redL,color:C.red,padding:"8px 13px",fontSize:12,marginRight:"auto"}}>🗑️ حذف</button>
      </div>}
      {!isLast&&<Dvd/>}
    </div>
  );
};

/* ══ HOME TAB ══ */
const HomeTab=({orders,onDeliver,onDelete,onEdit,onCallStatus,prices})=>{
  const pending=orders.filter(o=>o.status==="pending");
  const G={};pending.forEach(o=>{const k=o.delivDate||"__x__";if(!G[k])G[k]=[];G[k].push(o);});
  const keys=Object.keys(G).sort((a,b)=>a==="__x__"?1:b==="__x__"?-1:a.localeCompare(b));
  const grand={};pending.forEach(o=>{grand[o.birdId]=(grand[o.birdId]||0)+Number(o.qty||0);});
  const grandVal=pending.reduce((s,o)=>{const p=prices[o.birdId]?Number(prices[o.birdId]):0;return s+p*Number(o.qty||0);},0);
  const answered=pending.filter(o=>o.callStatus==="answered").length;
  const noAnswer=pending.filter(o=>o.callStatus==="noAnswer").length;
  const notCalled=pending.filter(o=>!o.callStatus||o.callStatus==="none").length;
  if(pending.length===0)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 28px",textAlign:"center",minHeight:"60vh"}}>
      <div className="fl" style={{fontSize:92,marginBottom:16,filter:"drop-shadow(0 10px 24px rgba(245,158,11,.3))"}}>🐥</div>
      <div style={{fontSize:22,fontWeight:900,color:C.pr,marginBottom:9}}>لا يوجد حجوزات</div>
      <div style={{fontSize:14,color:C.sub,lineHeight:1.9}}>اضغط زر <b>+</b> في أعلى اليمين لإضافة حجز</div>
    </div>
  );
  return(
    <div style={{paddingBottom:8}}>
      <div style={{margin:"14px 14px 10px",background:C.bnrGrad,borderRadius:22,padding:"18px 20px",boxShadow:`0 10px 30px ${C.pr}44`,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,left:-20,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.05)"}}/>
        <div style={{fontSize:12,color:"rgba(255,255,255,.7)",fontWeight:600,marginBottom:10}}>📦 إجمالي الحجوزات المعلقة</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:grandVal>0?12:0}}>
          {Object.entries(grand).map(([id,n])=>{const b=gb(id);return(
            <div key={id} style={{background:"rgba(255,255,255,.14)",border:"1px solid rgba(255,255,255,.22)",borderRadius:13,padding:"7px 13px",display:"flex",alignItems:"center",gap:7}}>
              <span style={{fontSize:20}}>{b.e}</span>
              <div><div style={{fontSize:22,fontWeight:900,color:"#fff",lineHeight:1}}>{fmt(n)}</div><div style={{fontSize:10,color:"rgba(255,255,255,.65)"}}>{b.short}</div></div>
            </div>
          );})}
        </div>
        {grandVal>0&&<div style={{background:"rgba(255,255,255,.16)",borderRadius:12,padding:"10px 15px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid rgba(255,255,255,.2)"}}>
          <span style={{fontSize:13,color:"rgba(255,255,255,.85)",fontWeight:600}}>💰 الإجمالي المتوقع</span>
          <span style={{fontSize:21,fontWeight:900,color:"#FEF3C7"}}>{fmt(grandVal)} ج</span>
        </div>}
      </div>
      {pending.length>0&&(
        <div style={{margin:"0 14px 12px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[[answered,"رد ✅","#D1FAE5","#10B981"],[noAnswer,"لم يرد ❌",C.redL,C.red],[notCalled,"لم يُتصل","#FEF3C7",C.pr3]].map(([n,l,bg,co],i)=>(
            <div key={i} style={{background:bg,border:`1.5px solid ${co}33`,borderRadius:14,padding:"11px 8px",textAlign:"center"}}>
              <div style={{fontSize:24,fontWeight:900,color:co}}>{n}</div>
              <div style={{fontSize:10,color:co,fontWeight:700,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      )}
      {keys.map(dk=>{
        const go=G[dk];const nd=dk==="__x__";
        const dayQty=go.reduce((a,o)=>a+Number(o.qty||0),0);
        const dayVal=go.reduce((s,o)=>{const p=prices[o.birdId]?Number(prices[o.birdId]):0;return s+p*Number(o.qty||0);},0);
        const tally={};go.forEach(o=>{tally[o.birdId]=(tally[o.birdId]||0)+Number(o.qty||0);});
        return(
          <div key={dk} style={{marginBottom:8}}>
            <div style={{background:C.bnrGrad,padding:"13px 18px"}}>
              <div style={{fontSize:17,fontWeight:900,color:"#fff",marginBottom:6}}>{nd?"📋 بدون تاريخ":`📅 ${fmtS(dk)}`}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:7}}>
                {Object.entries(tally).map(([id,n])=>{const b=gb(id);return<span key={id} style={{background:"rgba(255,255,255,.18)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,color:"#fff"}}>{b.e} {fmt(n)} {b.short}</span>;})}
              </div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                <Badge ch={`${go.length} عميل`} bg="rgba(255,255,255,.15)" color="#fff"/>
                <Badge ch={`${fmt(dayQty)} طير`} bg="rgba(254,243,199,.22)" color="#FEF3C7"/>
                {dayVal>0&&<Badge ch={`💰 ${fmt(dayVal)} ج`} bg="rgba(254,243,199,.22)" color="#FEF9C3"/>}

          </div>
        );
      })}
    </div>
  );
};

/* ══ STATS TAB ══ */
const StatsTab=({orders,prices})=>{
  const all=orders.filter(o=>o.status!=="cancelled");
  const done=orders.filter(o=>o.status==="done"||o.status==="active");
  const tally={};all.forEach(o=>{tally[o.birdId]=(tally[o.birdId]||0)+Number(o.qty||0);});
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  const maxQty=sorted[0]?sorted[0][1]:1;
  const totalRev=done.reduce((s,o)=>{const p=prices[o.birdId]?Number(prices[o.birdId]):0;return s+p*Number(o.qty||0);},0);
  const pendingRev=orders.filter(o=>o.status==="pending").reduce((s,o)=>{const p=prices[o.birdId]?Number(prices[o.birdId]):0;return s+p*Number(o.qty||0);},0);
  const totalDeposits=all.reduce((s,o)=>s+Number(o.deposit||0),0);
  const totalBirds=all.reduce((s,o)=>s+Number(o.qty||0),0);
  const usedIds=new Set(Object.keys(tally));
  const unused=BIRDS.filter(b=>!usedIds.has(b.id));
  const monthly={};all.forEach(o=>{const m=o.createdAt?.slice(0,7)||"unknown";if(!monthly[m])monthly[m]={qty:0,rev:0};monthly[m].qty+=Number(o.qty||0);const p=prices[o.birdId]?Number(prices[o.birdId]):0;monthly[m].rev+=p*Number(o.qty||0);});
  const monthSorted=Object.entries(monthly).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,4);
  const fmtMonth=m=>{if(!m||m==="unknown")return"—";const[y,mo]=m.split("-");return new Date(+y,+mo-1,1).toLocaleDateString("ar-EG",{month:"long",year:"numeric"});};
  if(all.length===0)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:16}}>📊</div>
      <div style={{fontSize:20,fontWeight:800,color:C.pr}}>لا توجد بيانات بعد</div>
      <div style={{fontSize:14,color:C.sub,marginTop:8}}>ابدأ بإضافة حجوزات لتظهر الإحصائيات</div>
    </div>
  );
  return(
    <div style={{padding:"16px",paddingBottom:20}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {ico:"💰",lbl:"الإيراد المحقق",val:`${fmt(totalRev)} ج`,bg:"linear-gradient(135deg,#92400E,#B45309)"},
          {ico:"⏳",lbl:"الإيراد المتوقع",val:`${fmt(pendingRev)} ج`,bg:"linear-gradient(135deg,#0EA5E9,#0284C7)"},
          {ico:"🤝",lbl:"إجمالي العربونات",val:`${fmt(totalDeposits)} ج`,bg:"linear-gradient(135deg,#10B981,#059669)"},
          {ico:"🐥",lbl:"إجمالي الطيور",val:`${fmt(totalBirds)} طير`,bg:"linear-gradient(135deg,#8B5CF6,#7C3AED)"},
        ].map((c,i)=>(
          <div key={i} style={{background:c.bg,borderRadius:18,padding:"17px 15px",boxShadow:"0 6px 20px rgba(0,0,0,.18)",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-20,left:-10,width:70,height:70,borderRadius:"50%",background:"rgba(255,255,255,.06)"}}/>
            <div style={{fontSize:28,marginBottom:7}}>{c.ico}</div>
            <div style={{fontSize:18,fontWeight:900,color:"#fff",lineHeight:1.1}}>{c.val}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.72)",marginTop:5}}>{c.lbl}</div>
          </div>
        ))}
      </div>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:15,color:C.pr,marginBottom:15}}>🏆 ترتيب الأصناف الأكثر مبيعاً</div>
        {sorted.map(([id,qty],i)=>{const b=gb(id);const pct=Math.round(qty/maxQty*100);const medals=["🥇","🥈","🥉"];return(
          <div key={id} style={{marginBottom:i<sorted.length-1?15:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
              <span style={{fontSize:20,flexShrink:0}}>{i<3?medals[i]:`${i+1}.`}</span>
              <div style={{width:38,height:38,borderRadius:11,background:b.bg,border:`2px solid ${b.brd}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:19}}>{b.e}</span></div>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:13,color:C.txt}}>{b.name}</div><div style={{fontSize:11,color:C.muted}}>{fmt(qty)} طير</div></div>
              <div style={{fontWeight:900,fontSize:16,color:b.brd}}>{pct}%</div>
            </div>
            <div style={{height:7,background:C.pr6,borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${b.brd},${b.brd}bb)`,borderRadius:99}}/>
            </div>
          </div>
        );})}
      </Card>
      {unused.length>0&&<Card style={{marginBottom:14,border:`2px dashed ${C.pr5}55`,background:C.pr6}}>
        <div style={{fontWeight:800,fontSize:14,color:C.pr2,marginBottom:5}}>🚀 فرص للتوسع</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {unused.map(b=><div key={b.id} style={{background:C.card,border:`1.5px solid ${b.brd}44`,borderRadius:12,padding:"8px 13px",display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:18}}>{b.e}</span>
            <div><div style={{fontSize:12,fontWeight:800,color:b.tx}}>{b.name}</div><div style={{fontSize:10,color:C.muted}}>0 حجز</div></div>
          </div>)}
        </div>
      </Card>}
      {monthSorted.length>0&&<Card style={{marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:15,color:C.pr,marginBottom:14}}>📅 إحصائيات شهرية</div>
        {monthSorted.map(([m,data],i)=>(

/* ══ SUPPLIER TAB ══ */
const SupplierTab=({orders,supplierPhone})=>{
  const [sent,setSent]=useState(false);
  const pending=orders.filter(o=>o.status==="pending");
  const tally={};pending.forEach(o=>{tally[o.birdId]=(tally[o.birdId]||0)+Number(o.qty||0);});
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  const total=Object.values(tally).reduce((a,b)=>a+b,0);
  const buildMsg=()=>{
    const d=new Date().toLocaleDateString("ar-EG",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    let m=`🐥 *طلب كتاكيت — مجموعة المودة*\n📅 ${d}\n${"━".repeat(24)}\n\n`;
    sorted.forEach(([id,n])=>{const b=gb(id);m+=`${b.e} ${b.name}: *${fmt(n)} طير*\n`;});
    m+=`\n${"━".repeat(24)}\n📦 *الإجمالي: ${fmt(total)} طير*\n\nشكراً 🙏`;
    return m;
  };
  const sendWA=()=>{
    if(!supplierPhone){alert("أضف رقم المورد في الإعدادات أولاً");return;}
    const p=supplierPhone.replace(/[^0-9]/g,"");
    const ip=p.startsWith("0")?"2"+p:p.startsWith("2")?p:"2"+p;
    window.open(`https://wa.me/${ip}?text=${encodeURIComponent(buildMsg())}`,"_blank");
    setSent(true);setTimeout(()=>setSent(false),4000);
  };
  if(pending.length===0)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:14}}>📦</div>
      <div style={{fontSize:20,fontWeight:800,color:C.pr}}>لا يوجد حجوزات معلقة</div>
    </div>
  );
  return(
    <div style={{padding:"16px"}}>
      <div style={{background:"linear-gradient(135deg,#075E54,#128C7E)",borderRadius:20,padding:"19px 20px",marginBottom:16,color:"#fff",boxShadow:"0 8px 24px rgba(7,94,84,.4)"}}>
        <div style={{fontSize:12,opacity:.8,marginBottom:5}}>📦 طلب المورد</div>
        <div style={{fontSize:34,fontWeight:900}}>{fmt(total)} طير</div>
        <div style={{fontSize:13,opacity:.8}}>{sorted.length} نوع • {pending.length} عميل</div>
        {!supplierPhone&&<div style={{marginTop:11,background:"rgba(255,255,255,.15)",borderRadius:10,padding:"8px 13px",fontSize:12,fontWeight:600}}>⚠️ أضف رقم المورد في الإعدادات</div>}
      </div>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:13}}>📋 الطلبية التفصيلية</div>
        {sorted.map(([id,n],i)=>{const b=gb(id);const pct=Math.round(n/total*100);return(
          <div key={id} style={{marginBottom:i<sorted.length-1?16:0}}>
            <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:7}}>
              <div style={{width:42,height:42,borderRadius:12,background:b.bg,border:`2px solid ${b.brd}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:21}}>{b.e}</span></div>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:13,color:C.txt}}>{b.name}</div><div style={{fontSize:11,color:C.muted}}>{pct}% من الطلبية</div></div>
              <div style={{fontWeight:900,fontSize:22,color:b.brd}}>{fmt(n)}</div>
            </div>
            <div style={{height:6,background:C.pr6,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:b.brd,borderRadius:99}}/></div>
          </div>
        );})}
        <div style={{marginTop:14,paddingTop:12,borderTop:`2px dashed ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:800,fontSize:15,color:C.pr}}>📦 الإجمالي</div>
          <div style={{fontSize:30,fontWeight:900,color:C.pr}}>{fmt(total)} <span style={{fontSize:13}}>طير</span></div>
        </div>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>👁️ معاينة الرسالة</div>
        <div style={{background:"#ECF8F1",borderRadius:12,padding:"13px 15px",fontSize:12,color:"#1a1a1a",lineHeight:2.1,whiteSpace:"pre-line",border:"1px solid #C3E8D0"}}>{buildMsg()}</div>
      </Card>
      <button className="abtn" onClick={sendWA}
        style={{width:"100%",padding:"19px",fontSize:17,fontWeight:900,borderRadius:17,background:sent?`linear-gradient(135deg,${C.grn},#15803D)`:"linear-gradient(135deg,#25D366,#128C7E)",color:"#fff",boxShadow:"0 6px 20px rgba(18,140,126,.5)",transition:"all .35s",marginBottom:8}}>
        {sent?"✅ تم الإرسال!":"📲 إرسال على واتساب المورد"}
      </button>
      {supplierPhone&&<div style={{textAlign:"center",fontSize:12,color:C.muted}}>📱 {supplierPhone}</div>}
    </div>
  );
};

        <p style={{color:"rgba(255,255,255,.75)",fontSize:14,textAlign:"center",marginBottom:15,fontWeight:600}}>🔒 أدخل كلمة السر</p>
        <input type="password" value={v} onChange={e=>{setV(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••"
          style={{width:"100%",padding:"17px",borderRadius:16,border:`2.5px solid ${err?"#F87171":"rgba(255,255,255,.28)"}`,fontSize:32,textAlign:"center",outline:"none",fontFamily:"Cairo,sans-serif",boxSizing:"border-box",background:"rgba(255,255,255,.12)",color:"#fff",letterSpacing:12,marginBottom:10,transition:"border-color .2s"}}/>
        {err&&<p style={{color:"#FCA5A5",textAlign:"center",fontSize:13,fontWeight:700,marginBottom:10}}>❌ كلمة السر غلط!</p>}
        <button onClick={go} style={{width:"100%",marginTop:8,padding:"17px",borderRadius:15,background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#fff",border:"none",fontSize:17,fontWeight:900,cursor:"pointer",fontFamily:"Cairo,sans-serif",boxShadow:"0 8px 24px rgba(245,158,11,.55)"}}>دخول 🔓</button>
        <p style={{color:"rgba(255,255,255,.38)",fontSize:11,textAlign:"center",marginTop:14}}>كلمة السر الافتراضية: 1234</p>
      </div>
    </div>
  );
};

/* ══ ROOT APP ══ */
function App(){
  const [rdy,setRdy]=useState(false);
  const [auth,setAuth]=useState(false);
  const [spw,setSpw]=useState("1234");
  const [orders,setOrders]=useState([]);
  const [prices,setPrices]=useState({});
  const [supPhone,setSupPhone]=useState("");
  const [tab,setTab]=useState("home");
  const [booking,setBooking]=useState(null);
  const [dark,setDark]=useState(()=>{try{return localStorage.getItem('mwdark')==='1';}catch{return false;}});
  const [syncState,setSyncState]=useState("loading");

  Object.assign(C,dark?DARK:LIGHT);

  useEffect(()=>{
    document.body.classList.toggle('dark',dark);
    try{localStorage.setItem('mwdark',dark?'1':'0');}catch{}
  },[dark]);

  /* Load from Firebase on start */
  useEffect(()=>{
    setSyncState("loading");
    hydrate().then(d=>{
      if(d){
        if(d.pw)setSpw(d.pw);
        if(d.orders)setOrders(d.orders);
        if(d.prices)setPrices(d.prices);
        if(d.supPhone)setSupPhone(d.supPhone);
      }
      setSyncState("ok");
      setRdy(true);
    }).catch(()=>{setSyncState("offline");setRdy(true);});
  },[]);

  const sv=useCallback((o,p=prices,sp=supPhone,pw=spw)=>{
    setOrders(o);
    persist({pw,orders:o,prices:p,supPhone:sp},setSyncState);
  },[prices,supPhone,spw]);

  const svPw=np=>{setSpw(np);persist({pw:np,orders,prices,supPhone},setSyncState);};
  const svPrices=p=>{setPrices(p);persist({pw:spw,orders,prices:p,supPhone},setSyncState);};
  const svSup=sp=>{setSupPhone(sp);persist({pw:spw,orders,prices,supPhone:sp},setSyncState);};

  const hSave=o=>{const ex=orders.find(x=>x.id===o.id);sv(ex?orders.map(x=>x.id===o.id?o:x):[...orders,o]);setBooking(null);};
  const hDeliver=id=>sv(orders.map(o=>o.id!==id?o:{...o,status:"active",delivDate:o.delivDate||now()}));
  const hDelete=id=>sv(orders.filter(o=>o.id!==id));
  const hFu=(id,note)=>sv(orders.map(o=>o.id!==id?o:{...o,fus:[...(o.fus||[]),{date:now(),note}]}));
  const hDone=id=>sv(orders.map(o=>o.id!==id?o:{...o,status:"done"}));
  const hCallStatus=(id,status)=>sv(orders.map(o=>o.id!==id?o:{...o,callStatus:status}));

  const ovCnt=orders.filter(o=>{if(o.status!=="active")return false;const l=o.fus?.length?o.fus.at(-1).date:o.delivDate;return dSince(l)>=10;}).length;
  const pendCnt=orders.filter(o=>o.status==="pending").length;
  const actCnt=orders.filter(o=>o.status==="active").length;
  const noAnsCnt=orders.filter(o=>o.status==="pending"&&o.callStatus==="noAnswer").length;

  if(!rdy)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0D0600,#2D1408,#4A2210)",gap:18}}>
      <div className="fl" style={{fontSize:76,filter:"drop-shadow(0 8px 20px rgba(245,158,11,.4))"}}>🐥</div>
      <div style={{color:"rgba(255,255,255,.7)",fontSize:16,fontWeight:700,fontFamily:"Cairo,sans-serif"}}>جاري تحميل البيانات من السحابة...</div>
      <div style={{color:"rgba(255,255,255,.4)",fontSize:13,fontFamily:"Cairo,sans-serif"}}>☁️ Firebase متصل</div>
    </div>
  );
  if(!auth)return<Login onLogin={()=>setAuth(true)} pw={spw}/>;

  const TABS=[
    {id:"home",    lbl:"الحجوزات", ico:"📋",badge:pendCnt},
    {id:"stats",   lbl:"إحصائيات", ico:"📊"},
    {id:"prices",  lbl:"الأسعار",  ico:"💰"},
    {id:"supplier",lbl:"المورد",   ico:"📦"},
    {id:"followup",lbl:"المتابعة", ico:"📞",badge:ovCnt,red:true},
    {id:"settings",lbl:"الإعدادات",ico:"⚙️"},
  ];

  return(
    <div style={{fontFamily:"Cairo,sans-serif",direction:"rtl",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",transition:"background .35s"}}>
      {/* HEADER */}
      <div style={{background:C.hdrGrad,padding:"13px 16px 12px",position:"sticky",top:0,zIndex:50,boxShadow:"0 4px 24px rgba(0,0,0,.25)"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.55)",marginBottom:2}}>{fmtL(now())}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"Tajawal,Cairo,sans-serif",fontSize:21,fontWeight:900,color:"#fff"}}>🐥 مجموعة المودة</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <SyncBadge state={syncState}/>
            {noAnsCnt>0&&<Badge ch={`${noAnsCnt} ❌`} bg="rgba(220,38,38,.3)" color="#FEE2E2"/>}
            <button onClick={()=>setDark(d=>!d)} className="abtn"
              style={{width:36,height:36,borderRadius:11,background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",fontSize:17}}>
              {dark?"☀️":"🌙"}
            </button>
            <button onClick={()=>setBooking("new")} className="gl"
              style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#FCD34D,#F59E0B)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:"#78350F",boxShadow:"0 4px 16px rgba(245,158,11,.6)",flexShrink:0}}>
              ＋
            </button>
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{paddingBottom:82}}>
        {tab==="home"    &&<HomeTab orders={orders} onDeliver={hDeliver} onDelete={hDelete} onEdit={o=>setBooking(o)} onCallStatus={hCallStatus} prices={prices}/>}
        {tab==="stats"   &&<StatsTab orders={orders} prices={prices}/>}
        {tab==="prices"  &&<PricesTab prices={prices} onSave={svPrices}/>}
        {tab==="supplier"&&<SupplierTab orders={orders} supplierPhone={supPhone}/>}
        {tab==="followup"&&<FollowupTab orders={orders} onFu={hFu} onDone={hDone} onDelete={hDelete} prices={prices}/>}
        {tab==="settings"&&<SettingsTab spw={spw} onChangePw={svPw} onLogout={()=>setAuth(false)} total={orders.length} supplierPhone={supPhone} onChangeSup={svSup} dark={dark} onToggleDark={()=>setDark(d=>!d)} syncState={syncState}/>}
      </div>

      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.nav,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${C.navBdr}`,display:"flex",zIndex:100,boxShadow:C.navShadow,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        {TABS.map(t=>{
          const active=tab===t.id;
          return(
            <button key={t.id} className="nav-btn" onClick={()=>setTab(t.id)}>
              {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:34,height:3,background:`linear-gradient(90deg,${C.pr4},${C.pr3})`,borderRadius:"0 0 6px 6px"}}/>}
              <span style={{fontSize:active?26:21,transition:"font-size .18s",transform:active?"translateY(-1px)":"none"}}>{t.ico}</span>
              <span style={{fontSize:9,color:active?C.pr:C.muted,fontWeight:active?900:500,transition:"color .18s"}}>{t.lbl}</span>
              {t.badge>0&&<span style={{position:"absolute",top:5,right:"calc(50% - 22px)",background:t.red?C.red:C.pr3,color:"#fff",borderRadius:99,padding:"1px 5px",fontSize:9,fontWeight:900,minWidth:16,textAlign:"center"}}>{t.badge}</span>}
            </button>
          );
        })}
      </nav>

      {booking&&<BookSheet edit={booking==="new"?null:booking} onClose={()=>setBooking(null)} onSave={hSave} prices={prices}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

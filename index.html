<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#ECE5DD;-webkit-overflow-scrolling:touch;-webkit-font-smoothing:antialiased;transition:background .3s;}
body.dark{background:#0B141A;}
input,textarea,button,select{font-family:'Cairo',sans-serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
*{scrollbar-width:none;-ms-overflow-style:none;}::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}50%{box-shadow:0 0 0 8px rgba(37,211,102,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bannerIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fu{animation:fadeUp .24s cubic-bezier(.22,.68,0,1.2) both}
.su{animation:slideUp .3s cubic-bezier(.32,.72,0,1) both}
.sr{animation:slideRight .28s cubic-bezier(.32,.72,0,1) both}
.fl{animation:float 3s ease-in-out infinite}
.gl{animation:glow 2s ease-in-out infinite}
.pls{animation:pulse 1.5s ease-in-out infinite}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;flex:1;-webkit-tap-highlight-color:transparent;position:relative;transition:opacity .15s;}
.nav-btn:active{opacity:.5;}
.bird-chip{cursor:pointer;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:transform .12s;border:2px solid transparent;-webkit-tap-highlight-color:transparent;padding:10px 4px;outline:none;width:100%;}
.bird-chip:active{transform:scale(.87);}
.abtn{border:none;cursor:pointer;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Cairo',sans-serif;font-weight:700;-webkit-tap-highlight-color:transparent;transition:transform .12s,opacity .12s;outline:none;}
.abtn:active{transform:scale(.9);opacity:.8;}
.ifield{width:100%;padding:13px 15px;border-radius:13px;border:1.5px solid #E9EDEF;font-size:15px;outline:none;font-family:'Cairo',sans-serif;background:#fff;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;box-sizing:border-box;color:#111B21;}
.ifield:focus{border-color:#25D366;box-shadow:0 0 0 3px rgba(37,211,102,.12);}
.ifield::placeholder{color:#8696A0;opacity:.8;}
body.dark .ifield{background:#2A3942;border-color:#3B4A54;color:#E9EDEF;}
body.dark .ifield:focus{border-color:#00A884;box-shadow:0 0 0 3px rgba(0,168,132,.12);}
body.dark .ifield::placeholder{color:#667781;}
.orow{animation:fadeUp .2s ease both;}
.calc-btn{border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;border-radius:14px;-webkit-tap-highlight-color:transparent;transition:transform .1s,opacity .1s;outline:none;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
.calc-btn:active{transform:scale(.87);opacity:.8;}
</style>

<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  const SW=`const C='mawada-v8';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>fetch(self.location.href).then(r=>c.put(self.location.href,r)).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>{if(c)return c;return fetch(e.request).then(r=>{if(!r||r.status!==200||r.type==='opaque')return r;var cl=r.clone();caches.open(C).then(cc=>cc.put(e.request,cl));return r;}).catch(()=>caches.match(self.location.href));}));});`;
  const b=new Blob([SW],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b),{scope:'./'}).catch(()=>{});
})();
var dP=null,iB=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dP=e;showIB();});
window.addEventListener('appinstalled',()=>{hideIB();dP=null;});
function showIB(){if(iB)return;iB=document.createElement('div');iB.innerHTML='<div style="display:flex;align-items:center;gap:11px;direction:rtl;"><span style="font-size:28px">&#x1F425;</span><div style="flex:1"><div style="font-weight:800;font-size:14px">&#x062B;&#x0628;&#x0651;&#x062A; &#x0627;&#x0644;&#x062A;&#x0637;&#x0628;&#x064A;&#x0642; &#x0639;&#x0644;&#x0649; &#x0634;&#x0627;&#x0634;&#x062A;&#x0643;</div><div style="font-size:11px;color:#86EFAC">&#x0627;&#x0634;&#x062A;&#x063A;&#x0644; &#x0643;&#x062A;&#x0637;&#x0628;&#x064A;&#x0642; &#x062D;&#x0642;&#x064A;&#x0642;&#x064A;!</div></div><button onclick="installApp()" style="background:#25D366;color:#fff;border:none;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:900;cursor:pointer;font-family:Cairo,sans-serif;flex-shrink:0">&#x062A;&#x062B;&#x0628;&#x064A;&#x062A; &#x2B07;&#xFE0F;</button><button onclick="hideIB2()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;flex-shrink:0">&#x2715;</button></div>';Object.assign(iB.style,{position:'fixed',bottom:'90px',left:'50%',transform:'translateX(-50%)',width:'calc(100% - 20px)',maxWidth:'460px',background:'#075E54',color:'#fff',padding:'13px 15px',borderRadius:'16px',zIndex:'9999',fontFamily:'Cairo,sans-serif',boxShadow:'0 8px 32px rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.15)',animation:'bannerIn .4s cubic-bezier(.32,.72,0,1) both'});document.body.appendChild(iB);setTimeout(hideIB,15000);}
function hideIB(){if(iB){iB.remove();iB=null;}}
window.hideIB2=hideIB;
window.installApp=async function(){if(!dP)return;dP.prompt();await dP.userChoice;dP=null;hideIB();};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useCallback}=React;

/* ══ DEFAULT BIRDS ══ */
const DEFAULT_BIRDS=[
  {id:"broiler",  name:"فراخ تسمين بيضاء",short:"تسمين",  e:"🐔",unit:"فرخ",   bg:"#FEF9C3",brd:"#EAB308",tx:"#713F12"},
  {id:"shafar",   name:"فراخ شفر",         short:"شفر",    e:"🐓",unit:"فرخ",   bg:"#D1FAE5",brd:"#10B981",tx:"#065F46"},
  {id:"hybrid",   name:"فراخ هجين صافي",  short:"هجين",   e:"🐓",unit:"فرخ",   bg:"#DBEAFE",brd:"#3B82F6",tx:"#1E3A8A"},
  {id:"baladi",   name:"فراخ بلدي مشعر",  short:"بلدي",   e:"🦃",unit:"فرخ",   bg:"#FED7AA",brd:"#F97316",tx:"#7C2D12"},
  {id:"muscovy",  name:"بط مسكوفي",        short:"مسكوفي", e:"🦆",unit:"بطة",  bg:"#A7F3D0",brd:"#059669",tx:"#064E3B"},
  {id:"baghl",    name:"بط بغال",          short:"بغال",   e:"🦢",unit:"بطة",  bg:"#E0F2FE",brd:"#0EA5E9",tx:"#0C4A6E"},
  {id:"sharifan", name:"بط شريفان",        short:"شريفان", e:"🦅",unit:"بطة",  bg:"#FCE7F3",brd:"#EC4899",tx:"#831843"},
  {id:"faransawi",name:"بط فرنساوي",       short:"فرنساوي",e:"🦆",unit:"بطة",  bg:"#EDE9FE",brd:"#8B5CF6",tx:"#4C1D95"},
  {id:"quail",    name:"سمان",             short:"سمان",   e:"🐦",unit:"سمانة",bg:"#FEF3C7",brd:"#D97706",tx:"#92400E"},
];
let BIRDS=[...DEFAULT_BIRDS];
const gb=id=>BIRDS.find(b=>b.id===id)||DEFAULT_BIRDS.find(b=>b.id===id)||{name:id,short:id,e:"🐦",unit:"طير",bg:"#F3F4F6",brd:"#9CA3AF",tx:"#374151"};

/* ══ HELPERS ══ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const now=today;
const dSince=d=>!d?0:Math.floor((Date.now()-new Date(d).getTime())/86400000);
const fmtL=iso=>!iso?"—":new Date(iso).toLocaleDateString("ar-EG",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const fmtS=iso=>!iso?"بدون تاريخ":new Date(iso).toLocaleDateString("ar-EG",{weekday:"short",day:"numeric",month:"numeric"});
const fmt=n=>Number(n||0).toLocaleString("ar-EG");
const sugDates=()=>{const r=[];const d=new Date();for(let i=1;i<=21&&r.length<6;i++){d.setDate(d.getDate()+1);if([0,3].includes(d.getDay()))r.push(new Date(d).toISOString().slice(0,10));}return r;};

/* ══ ORDER HELPERS ══
   order.items = [{birdId, qty}]  (multi-item support)
   order.birdId + order.qty kept for backward compat
*/
const getItems=o=>{
  if(o.items&&o.items.length)return o.items;
  if(o.birdId)return [{birdId:o.birdId,qty:o.qty||0}];
  return[];
};
const totalQty=o=>getItems(o).reduce((s,it)=>s+Number(it.qty||0),0);
const totalVal=(o,prices)=>getItems(o).reduce((s,it)=>{const p=prices[it.birdId]?Number(prices[it.birdId]):0;return s+p*Number(it.qty||0);},0);
const mainBird=o=>{const items=getItems(o);if(!items.length)return gb("");const top=items.reduce((a,b)=>Number(b.qty)>Number(a.qty)?b:a,items[0]);return gb(top.birdId);};

/* ══ STORAGE ══ */
const SKEY="mawada_v8";
const saveLocal=d=>{try{localStorage.setItem(SKEY,JSON.stringify(d));}catch{}};
const loadLocal=()=>{try{const r=localStorage.getItem(SKEY);return r?JSON.parse(r):null;}catch{return null;}};
const saveCloud=(d,onState)=>{
  saveLocal(d);
  if(onState)onState("saving");
  DREF.set(d).then(()=>{if(onState){onState("saved");setTimeout(()=>onState("ok"),2500);}}).catch(()=>{if(onState)onState("offline");});
};
const loadCloud=async()=>{
  try{const doc=await DREF.get();if(doc.exists){const d=doc.data();saveLocal(d);return d;}}catch{}
  return loadLocal();
};
const checkPriceReset=d=>{if(!d)return d;if(d.priceDate!==today())return{...d,prices:{},priceDate:today()};return d;};
const autoClean=orders=>orders.filter(o=>{
  if(o.status==="pending")return true;
  return dSince(o.delivDate||o.createdAt)<35;
});

/* ══ COLORS ══ */
const LIGHT={bg:"#ECE5DD",card:"#FFFFFF",nav:"#075E54",navA:"#25D366",navI:"rgba(255,255,255,.55)",pr:"#075E54",pr2:"#128C7E",pr3:"#25D366",pr4:"#DCF8C6",pr6:"#F0FAF4",txt:"#111B21",sub:"#3B4A54",muted:"#667781",bdr:"#E9EDEF",bdr2:"#D1D7DB",red:"#DC2626",redL:"#FFF0F0",grn:"#25D366",grnL:"#DCF8C6",hdr:"#075E54",cSh:"0 1px 4px rgba(0,0,0,.07)",cBd:"rgba(0,0,0,.06)",nSh:"0 -2px 12px rgba(0,0,0,.15)",bnr:"linear-gradient(135deg,#075E54,#128C7E)"};
const DARK={bg:"#0B141A",card:"#1F2C34",nav:"#1F2C34",navA:"#00A884",navI:"#8696A0",pr:"#00A884",pr2:"#02A676",pr3:"#25D366",pr4:"#0D2B22",pr6:"#1A2530",txt:"#E9EDEF",sub:"#8696A0",muted:"#667781",bdr:"#2A3942",bdr2:"#3B4A54",red:"#F15C6D",redL:"#1C0A0A",grn:"#00A884",grnL:"#0D2B22",hdr:"#1F2C34",cSh:"0 1px 4px rgba(0,0,0,.3)",cBd:"rgba(255,255,255,.04)",nSh:"0 -2px 12px rgba(0,0,0,.4)",bnr:"linear-gradient(135deg,#1F2C34,#2A3942)"};
let C={...LIGHT};

/* ══ MICRO ══ */
const FL=({ch,req})=><div style={{fontSize:13,fontWeight:700,color:C.sub,marginBottom:6}}>{ch}{req&&<span style={{color:C.red}}> *</span>}</div>;
const Dvd=()=><div style={{height:1,background:C.bdr,margin:"0 16px"}}/>;
const Card=({ch,style={}})=><div style={{background:C.card,borderRadius:16,padding:16,boxShadow:C.cSh,border:`1px solid ${C.cBd}`,...style}}>{ch}</div>;
const Tog=({on,fn})=>(
  <button onClick={fn} style={{width:52,height:28,borderRadius:99,background:on?C.grn:"#9CA3AF",border:"none",cursor:"pointer",position:"relative",transition:"all .3s",flexShrink:0}}>
    <div style={{position:"absolute",top:3,right:on?3:undefined,left:on?undefined:3,width:22,height:22,borderRadius:"50%",background:"#fff",boxShadow:"0 2px 4px rgba(0,0,0,.2)",transition:"all .3s"}}/>
  </button>
);

/* ══ BOOKING SHEET — Multi-item support ══ */
const BookSheet=({onClose,onSave,edit=null,prices={}})=>{
  const initItems=edit?getItems(edit):[{birdId:"",qty:""}];
  const [items,setItems]=useState(initItems.map(it=>({birdId:it.birdId,qty:String(it.qty)})));
  const [name,setName]=useState(edit?.custName||"");
  const [phone,setPhone]=useState(edit?.phone||"");
  const [dep,setDep]=useState(edit?.deposit?String(edit.deposit):"");
  const [dd,setDd]=useState(edit?.delivDate||"");
  const [notes,setNotes]=useState(edit?.notes||"");
  const [err,setErr]=useState("");
  const [step,setStep]=useState(1);
  const sug=sugDates();

  const updItem=(i,field,val)=>setItems(prev=>prev.map((it,idx)=>idx===i?{...it,[field]:val}:it));
  const addItem=()=>setItems(prev=>[...prev,{birdId:"",qty:""}]);
  const removeItem=i=>setItems(prev=>prev.filter((_,idx)=>idx!==i));

  const calcTotal=()=>items.reduce((s,it)=>{const p=it.birdId&&prices[it.birdId]?Number(prices[it.birdId]):0;return s+p*Number(it.qty||0);},0);
  const total=calcTotal();

  const next=()=>{
    if(!name.trim()){setErr("اكتب اسم العميل");return;}
    if(!items[0].birdId){setErr("اختر نوع الطير على الأقل");return;}
    if(!items[0].qty||+items[0].qty<=0){setErr("اكتب الكمية");return;}
    const validItems=items.filter(it=>it.birdId&&+it.qty>0);
    if(!validItems.length){setErr("أضف طير وكمية على الأقل");return;}
    setErr("");setStep(2);
  };
  const doSave=()=>{
    const validItems=items.filter(it=>it.birdId&&+it.qty>0).map(it=>({birdId:it.birdId,qty:+it.qty}));
    onSave({
      id:edit?.id||uid(),custName:name.trim(),phone:phone.trim(),
      items:validItems,
      birdId:validItems[0]?.birdId||"",qty:validItems[0]?.qty||0,
      deposit:+dep||0,delivDate:dd,notes:notes.trim(),
      status:"pending",createdAt:edit?.createdAt||now(),fus:edit?.fus||[]
    });
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,.72)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div className="su" onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,background:C.card,borderRadius:"22px 22px 0 0",maxHeight:"93vh",overflowY:"auto",paddingBottom:32}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 6px"}}><div style={{width:40,height:4,background:C.bdr2,borderRadius:99}}/></div>
        <div style={{padding:"4px 20px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:20,fontWeight:900,color:C.pr}}>{edit?"✏️ تعديل الحجز":"🐥 حجز جديد"}</div><div style={{fontSize:11,color:C.muted}}>الخطوة {step} من 2</div></div>
          <div style={{display:"flex",gap:8}}>
            {step===2&&<button onClick={()=>setStep(1)} className="abtn" style={{background:C.pr6,color:C.pr,padding:"8px 14px",fontSize:13,border:`1px solid ${C.bdr}`}}>← رجوع</button>}
            <button onClick={onClose} className="abtn" style={{background:C.bdr,color:C.muted,padding:"8px 13px",fontSize:13}}>✕ إغلاق</button>
          </div>
        </div>
        <div style={{height:3,background:C.bdr,margin:"0 20px 16px",borderRadius:99}}><div style={{height:"100%",width:step===1?"50%":"100%",background:C.grn,borderRadius:99,transition:"width .3s"}}/></div>
        <div style={{padding:"0 20px"}}>
          {step===1&&<div className="fu">
            <FL ch="👤 اسم العميل" req/>
            <input className="ifield" value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: محمد أحمد" style={{marginBottom:11}}/>
            <FL ch="📱 رقم التليفون (اختياري)"/>
            <input className="ifield" type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="01xxxxxxxxx" inputMode="tel" style={{marginBottom:14}}/>

            {/* ── MULTI-ITEM BIRDS ── */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <FL ch="🐥 الطيور المطلوبة" req/>
              <button onClick={addItem} className="abtn" style={{background:C.grn,color:"#fff",padding:"6px 12px",fontSize:12,borderRadius:10}}>+ إضافة صنف</button>
            </div>
            {items.map((it,i)=>{
              const b=gb(it.birdId);
              const unitP=it.birdId&&prices[it.birdId]?Number(prices[it.birdId]):0;
              const lineTotal=unitP&&it.qty?unitP*Number(it.qty):0;
              return(
                <div key={i} style={{background:it.birdId?b.bg:C.pr6,borderRadius:14,padding:"12px",marginBottom:10,border:`1.5px solid ${it.birdId?b.brd:C.bdr}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.sub}}>الصنف {i+1}</span>
                    {items.length>1&&<button onClick={()=>removeItem(i)} className="abtn" style={{background:C.redL,color:C.red,padding:"4px 9px",fontSize:12,borderRadius:8}}>✕ حذف</button>}
                  </div>
                  {/* Bird selector grid */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:9}}>
                    {BIRDS.map(bd=>{const s=it.birdId===bd.id;return(
                      <button key={bd.id} onClick={()=>updItem(i,"birdId",bd.id)} className="bird-chip"
                        style={{background:s?bd.brd:bd.bg,borderColor:s?bd.brd:`${bd.brd}44`,padding:"8px 4px",boxShadow:s?`0 4px 12px ${bd.brd}55`:"none"}}>
                        <span style={{fontSize:22}}>{bd.e}</span>
                        <span style={{fontSize:8,fontWeight:700,color:s?"#fff":bd.tx,textAlign:"center",lineHeight:1.3}}>{bd.name}</span>
                      </button>
                    );})}
                  </div>

/* ══ CUSTOMER PROFILE ══ */
const CustomerProfile=({order,onClose,onDelete,onEdit,onDeliver,prices})=>{
  const items=getItems(order);
  const total=totalVal(order,prices);
  const balance=total>0?total-Number(order.deposit||0):0;
  const b=mainBird(order);
  const delivDay=order.delivDate||order.createdAt;
  const age=dSince(delivDay);
  const daysLeft=35-age;
  const ageClr=age>=30?C.red:age>=20?"#F59E0B":C.grn;

  const sendReceipt=()=>{
    if(!order.phone){alert("لا يوجد رقم تليفون");return;}
    const p=order.phone.replace(/[^0-9]/g,"");
    const ip=p.startsWith("0")?"2"+p:p.startsWith("2")?p:"2"+p;
    const d=order.delivDate?fmtL(order.delivDate):"لم يُحدد";
    let msg=`🧾 *وصل حجز — مجموعة المودة*\n${"━".repeat(26)}\n`;
    msg+=`👤 *الاسم:* ${order.custName}\n`;
    if(order.phone)msg+=`📱 *التليفون:* ${order.phone}\n`;
    msg+=`\n📦 *الطيور المحجوزة:*\n`;
    items.forEach(it=>{const bd=gb(it.birdId);msg+=`${bd.e} ${bd.name}: *${fmt(it.qty)} ${bd.unit}*\n`;});
    msg+=`\n📅 *موعد التسليم:* ${d}\n`;
    if(total>0){msg+=`💰 *الإجمالي:* ${fmt(total)} جنيه\n`;if(order.deposit>0){msg+=`🤝 *العربون:* ${fmt(order.deposit)} جنيه\n`;msg+=`💳 *المتبقي:* ${fmt(balance)} جنيه\n`;}}
    if(order.notes)msg+=`📝 *ملاحظات:* ${order.notes}\n`;
    msg+=`${"━".repeat(26)}\nشكراً لثقتكم 🙏\n*مجموعة المودة*`;
    window.open(`https://wa.me/${ip}?text=${encodeURIComponent(msg)}`,"_blank");
  };
  const doDelete=()=>{if(window.confirm(`حذف حجز ${order.custName} نهائياً؟`)){onDelete(order.id);onClose();}};

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:C.bg,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}} className="sr">
      {/* Header */}
      <div style={{background:C.hdr,padding:"14px 14px 12px",display:"flex",alignItems:"center",gap:11,flexShrink:0}}>
        <button onClick={onClose} className="abtn" style={{background:"rgba(255,255,255,.15)",color:"#fff",width:38,height:38,borderRadius:"50%",fontSize:20,flexShrink:0}}>←</button>
        <div style={{width:42,height:42,borderRadius:"50%",background:b.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:22}}>{b.e}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:"#fff",fontWeight:800,fontSize:17,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{order.custName}</div>
          <div style={{color:"rgba(255,255,255,.6)",fontSize:11}}>{items.length>1?`${items.length} أصناف`:b.name}</div>
        </div>
        {order.phone&&<a href={`tel:${order.phone}`} className="abtn" style={{background:"rgba(255,255,255,.15)",color:"#fff",width:38,height:38,borderRadius:"50%",fontSize:18,textDecoration:"none",flexShrink:0}}>📞</a>}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:14}}>
        {/* Age bar */}
        {order.status==="active"&&(
          <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,border:`1.5px solid ${ageClr}33`,boxShadow:C.cSh}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontWeight:800,fontSize:14,color:ageClr}}>🐣 عمر الدورة: <span style={{fontSize:18}}>{age}</span> يوم</div>
              <div style={{fontSize:12,color:C.muted}}>{daysLeft>0?`متبقي ${daysLeft} يوم`:"انتهت الدورة!"}</div>
            </div>
            <div style={{height:10,background:C.bdr,borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(age/35*100,100)}%`,background:`linear-gradient(90deg,${C.grn},${age>25?C.red:"#F59E0B"})`,borderRadius:99}}/>
            </div>
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>{age>=35?"⚠️ تجاوز 35 يوم":age>=30?"🔴 قرب النهاية":age>=20?"🟡 المنتصف":"🟢 بداية الدورة"} — استلم: {fmtS(delivDay)}</div>
          </div>
        )}

        {/* Items */}
        <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,boxShadow:C.cSh,border:`1px solid ${C.cBd}`}}>
          <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:10}}>📦 الطيور المحجوزة</div>
          {items.map((it,i)=>{const bd=gb(it.birdId);const lp=prices[it.birdId]?Number(prices[it.birdId]):0;const lt=lp*Number(it.qty||0);return(
            <div key={i} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 0",borderBottom:i<items.length-1?`1px solid ${C.bdr}`:"none"}}>
              <div style={{width:40,height:40,borderRadius:11,background:bd.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:21}}>{bd.e}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:C.txt}}>{bd.name}</div>
                <div style={{fontSize:12,color:bd.tx,fontWeight:700}}>{fmt(it.qty)} {bd.unit}</div>
              </div>
              {lt>0&&<div style={{fontSize:13,fontWeight:900,color:C.pr}}>{fmt(lt)} ج</div>}
            </div>
          );})}
          {total>0&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:`2px dashed ${C.bdr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,color:C.sub,fontWeight:600}}>💰 الإجمالي الكلي</span>
              <span style={{fontSize:18,fontWeight:900,color:C.pr}}>{fmt(total)} ج</span>
            </div>
          )}
        </div>

        {/* Info */}
        <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,boxShadow:C.cSh,border:`1px solid ${C.cBd}`}}>
          <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:10}}>📋 تفاصيل الحجز</div>
          {[
            order.phone?["📱","التليفون",order.phone,{}]:null,
            order.delivDate?["📅","يوم التسليم",fmtS(order.delivDate),{}]:null,
            order.deposit>0?["🤝","العربون",`${fmt(order.deposit)} ج`,{}]:null,
            balance>0&&total>0?["💳","المتبقي",`${fmt(balance)} ج`,{color:C.red,fontWeight:900}]:null,
          ].filter(Boolean).map(([ico,lbl,val,vs],i,arr)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<arr.length-1?`1px solid ${C.bdr}`:"none"}}>
              <span style={{fontSize:17,width:22,textAlign:"center",flexShrink:0}}>{ico}</span>
              <span style={{fontSize:12,color:C.muted,flexShrink:0,minWidth:55}}>{lbl}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.txt,marginRight:"auto",...vs}}>{val}</span>
            </div>
          ))}
          {order.notes&&<div style={{marginTop:10,padding:"9px 12px",background:C.pr6,borderRadius:10,fontSize:13,color:C.sub,border:`1px solid ${C.bdr}`}}>📝 {order.notes}</div>}
        </div>

        {order.fus?.length>0&&(
          <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,boxShadow:C.cSh,border:`1px solid ${C.cBd}`}}>
            <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:10}}>📞 سجل المتابعات ({order.fus.length})</div>
            {order.fus.map((f,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<order.fus.length-1?`1px dashed ${C.bdr}`:"none"}}>
                <span style={{fontSize:10,color:C.muted,flexShrink:0,paddingTop:2}}>{fmtS(f.date)}</span>
                <span style={{fontSize:13,color:C.txt}}>{f.note}</span>
              </div>
            ))}
          </div>
        )}

        {/* Status */}
        <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,boxShadow:C.cSh,border:`1px solid ${C.cBd}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{order.status==="pending"?"⏳":order.status==="active"?"✅":"🏁"}</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:order.status==="pending"?C.pr:order.status==="active"?C.grn:C.muted}}>
                {order.status==="pending"?"في الانتظار":order.status==="active"?"تم الاستلام — قيد المتابعة":"منتهي"}
              </div>
              <div style={{fontSize:11,color:C.muted}}>تاريخ التسجيل: {fmtS(order.createdAt)}</div>
            </div>
          </div>
        </div>

        {/* Actions */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {order.status==="pending"&&<button className="abtn" onClick={()=>{onDeliver(order.id);onClose();}} style={{width:"100%",background:C.grn,color:"#fff",padding:"15px",fontSize:15,borderRadius:13,boxShadow:`0 4px 14px ${C.grn}44`}}>✅ تأكيد الاستلام — نقل للمتابعة</button>}
          {order.phone&&<button className="abtn" onClick={sendReceipt} style={{width:"100%",background:"linear-gradient(135deg,#25D366,#128C7E)",color:"#fff",padding:"14px",fontSize:14,borderRadius:13}}>📲 إرسال وصل واتساب</button>}
          <button className="abtn" onClick={()=>{onEdit(order);onClose();}} style={{width:"100%",background:C.pr6,color:C.pr,padding:"13px",fontSize:14,borderRadius:13,border:`1px solid ${C.bdr}`}}>✏️ تعديل الحجز</button>
          <button className="abtn" onClick={doDelete} style={{width:"100%",background:C.redL,color:C.red,padding:"13px",fontSize:14,borderRadius:13,border:`1px solid ${C.red}22`}}>🗑️ حذف الحجز نهائياً</button>
        </div>
      </div>
    </div>
  );
};

/* ══ HOME TAB ══ */
const HomeTab=({orders,onDeliver,onViewCustomer,prices})=>{
  const pending=orders.filter(o=>o.status==="pending");
  if(!pending.length)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 28px",textAlign:"center",minHeight:"60vh"}}>
      <div className="fl" style={{fontSize:88,marginBottom:14,filter:"drop-shadow(0 8px 20px rgba(37,211,102,.25))"}}>🐥</div>
      <div style={{fontSize:21,fontWeight:900,color:C.pr,marginBottom:8}}>لا يوجد حجوزات</div>
      <div style={{fontSize:14,color:C.muted,lineHeight:1.9}}>اضغط <b style={{color:C.grn}}>➕</b> في الأسفل لإضافة حجز</div>
    </div>
  );
  const G={};pending.forEach(o=>{const k=o.delivDate||"__x__";if(!G[k])G[k]=[];G[k].push(o);});
  const keys=Object.keys(G).sort((a,b)=>a==="__x__"?1:b==="__x__"?-1:a.localeCompare(b));
  const grand={};pending.forEach(o=>getItems(o).forEach(it=>{grand[it.birdId]=(grand[it.birdId]||0)+Number(it.qty||0);}));
  const grandVal=pending.reduce((s,o)=>s+totalVal(o,prices),0);
  return(
    <div style={{paddingBottom:8}}>
      {/* Summary banner */}
      <div style={{margin:"12px 12px 10px",background:C.bnr,borderRadius:18,padding:"16px 18px",boxShadow:`0 6px 20px ${C.pr}33`}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginBottom:8,fontWeight:600}}>📦 إجمالي الحجوزات المعلقة</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:grandVal>0?10:0}}>
          {Object.entries(grand).map(([id,n])=>{const b=gb(id);return(
            <div key={id} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",borderRadius:11,padding:"6px 11px",display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:18}}>{b.e}</span>
              <div><div style={{fontSize:20,fontWeight:900,color:"#fff",lineHeight:1}}>{fmt(n)}</div><div style={{fontSize:9,color:"rgba(255,255,255,.6)"}}>{b.short}</div></div>
            </div>
          );})}
        </div>
        {grandVal>0&&<div style={{background:"rgba(255,255,255,.14)",borderRadius:10,padding:"8px 13px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid rgba(255,255,255,.18)"}}>
          <span style={{fontSize:12,color:"rgba(255,255,255,.8)",fontWeight:600}}>💰 الإجمالي المتوقع</span>
          <span style={{fontSize:19,fontWeight:900,color:"#fff"}}>{fmt(grandVal)} ج</span>
        </div>}
      </div>
      {keys.map(dk=>{
        const go=G[dk];const nd=dk==="__x__";
        const tally={};go.forEach(o=>getItems(o).forEach(it=>{tally[it.birdId]=(tally[it.birdId]||0)+Number(it.qty||0);}));
        return(
          <div key={dk} style={{marginBottom:8}}>
            <div style={{background:C.bnr,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,fontWeight:900,color:"#fff"}}>{nd?"📋 بدون تاريخ":`📅 ${fmtS(dk)}`}</span>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {Object.entries(tally).map(([id,n])=>{const b=gb(id);return<span key={id} style={{background:"rgba(255,255,255,.18)",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700,color:"#fff"}}>{b.e} {fmt(n)} {b.short}</span>;})}
              </div>
            </div>
            {go.map(o=>{
              const b=mainBird(o);const items=getItems(o);const tv=totalVal(o,prices);
              return(
                <div key={o.id} className="orow" style={{background:C.card,display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:`1px solid ${C.bdr}`}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:b.bg,border:`2px solid ${b.brd}44`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginLeft:11,fontSize:22}}>{b.e}</div>
                  <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onViewCustomer(o)}>
                    <div style={{fontWeight:800,fontSize:15,color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.custName}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:1}}>
                      {items.map((it,i)=>{const bd=gb(it.birdId);return<span key={i} style={{marginLeft:i>0?6:0}}><span style={{color:bd.tx,fontWeight:700}}>{fmt(it.qty)} {bd.short}</span></span>;})}
                      {o.deposit>0&&<span style={{marginRight:6,color:C.grn}}>• عربون: {fmt(o.deposit)}ج</span>}
                    </div>
                    {tv>0&&<div style={{fontSize:11,fontWeight:800,color:C.pr,marginTop:1}}>💰 {fmt(tv)} ج</div>}
                  </div>
                  <div style={{display:"flex",gap:7,flexShrink:0}}>
                    {o.phone?<a href={`tel:${o.phone}`} className="abtn" style={{background:C.grn,color:"#fff",width:38,height:38,borderRadius:"50%",fontSize:17,textDecoration:"none"}}>📞</a>:<div style={{width:38,height:38}}/>}
                    <button className="abtn" onClick={()=>onDeliver(o.id)} style={{background:C.grnL,color:C.grn,padding:"7px 12px",fontSize:11,border:`1.5px solid ${C.grn}44`,borderRadius:20,fontWeight:700,whiteSpace:"nowrap"}}>✅ استلم</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
};

/* ══ STATS TAB ══ */
const StatsTab=({orders,prices})=>{
  const all=orders.filter(o=>o.status!=="cancelled");
  const tally={};all.forEach(o=>getItems(o).forEach(it=>{tally[it.birdId]=(tally[it.birdId]||0)+Number(it.qty||0);}));
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  const maxQ=sorted[0]?sorted[0][1]:1;
  const totalRev=all.filter(o=>o.status==="done"||o.status==="active").reduce((s,o)=>s+totalVal(o,prices),0);
  const pendRev=orders.filter(o=>o.status==="pending").reduce((s,o)=>s+totalVal(o,prices),0);
  const totalDep=all.reduce((s,o)=>s+Number(o.deposit||0),0);
  const totalBirds=all.reduce((s,o)=>s+totalQty(o),0);
  const monthly={};all.forEach(o=>{const m=o.createdAt?.slice(0,7)||"?";if(!monthly[m])monthly[m]={qty:0,rev:0};monthly[m].qty+=totalQty(o);monthly[m].rev+=totalVal(o,prices);});
  const mSorted=Object.entries(monthly).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,4);
  const fmtM=m=>{try{const[y,mo]=m.split("-");return new Date(+y,+mo-1,1).toLocaleDateString("ar-EG",{month:"long",year:"numeric"});}catch{return m;}};
  if(!all.length)return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",textAlign:"center"}}><div style={{fontSize:68,marginBottom:14}}>📊</div><div style={{fontSize:18,fontWeight:800,color:C.pr}}>لا توجد بيانات بعد</div></div>;
  return(
    <div style={{padding:14,paddingBottom:20}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>
        {[{ico:"💰",lbl:"الإيراد المحقق",val:`${fmt(totalRev)} ج`,bg:"linear-gradient(135deg,#075E54,#128C7E)"},{ico:"⏳",lbl:"الإيراد المتوقع",val:`${fmt(pendRev)} ج`,bg:"linear-gradient(135deg,#0EA5E9,#0284C7)"},{ico:"🤝",lbl:"العربونات",val:`${fmt(totalDep)} ج`,bg:"linear-gradient(135deg,#10B981,#059669)"},{ico:"🐥",lbl:"إجمالي الطيور",val:`${fmt(totalBirds)} طير`,bg:"linear-gradient(135deg,#8B5CF6,#7C3AED)"}].map((c,i)=>(
          <div key={i} style={{background:c.bg,borderRadius:16,padding:"15px 13px",boxShadow:"0 4px 14px rgba(0,0,0,.15)"}}><div style={{fontSize:26,marginBottom:6}}>{c.ico}</div><div style={{fontSize:17,fontWeight:900,color:"#fff",lineHeight:1.1}}>{c.val}</div><div style={{fontSize:10,color:"rgba(255,255,255,.7)",marginTop:4}}>{c.lbl}</div></div>
        ))}
      </div>
      {sorted.length>0&&<Card ch={<>
        <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:13}}>🏆 الأصناف الأكثر مبيعاً</div>
        {sorted.map(([id,qty],i)=>{const b=gb(id);const pct=Math.round(qty/maxQ*100);const medals=["🥇","🥈","🥉"];return(
          <div key={id} style={{marginBottom:i<sorted.length-1?13:0}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}><span style={{fontSize:18}}>{i<3?medals[i]:`${i+1}.`}</span><span style={{fontSize:20}}>{b.e}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:12,color:C.txt}}>{b.name}</div><div style={{fontSize:10,color:C.muted}}>{fmt(qty)} {b.unit}</div></div><span style={{fontWeight:900,fontSize:14,color:b.brd}}>{pct}%</span></div>
            <div style={{height:6,background:C.pr6,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:b.brd,borderRadius:99}}/></div>
          </div>
        );})}
      </>} style={{marginBottom:12}}/>}
      {mSorted.length>0&&<Card ch={<>
        <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:12}}>📅 إحصائيات شهرية</div>
        {mSorted.map(([m,data],i)=>(
          <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<mSorted.length-1?`1px dashed ${C.bdr}`:"none"}}>
            <div><div style={{fontWeight:700,fontSize:13,color:C.txt}}>{fmtM(m)}</div><div style={{fontSize:11,color:C.muted}}>{fmt(data.qty)} طير</div></div>
            {data.rev>0&&<div style={{fontWeight:900,fontSize:14,color:C.pr}}>{fmt(data.rev)} ج</div>}
          </div>
        ))}
      </>} style={{marginBottom:12}}/>}
      <Card ch={<>
        <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:10}}>📋 ملخص</div>
        {[["⏳ معلقة",orders.filter(o=>o.status==="pending").length,C.pr2],["✅ استلم",orders.filter(o=>o.status==="active").length,C.grn],["🏁 منتهي",orders.filter(o=>o.status==="done").length,C.muted],["📊 الكل",all.length,C.pr]].map(([l,n,co],i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<3?`1px dashed ${C.bdr}`:"none"}}>

/* ══ SUPPLIER TAB ══ */

  const [sent,setSent]=useState(false);

  const tally={};pending.forEach(o=>getItems(o).forEach(it=>{tally[it.birdId]=(tally[it.birdId]||0)+Number(it.qty||0);}));
  const sorted=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  const total=Object.values(tally).reduce((a,b)=>a+b,0);
  const buildMsg=()=>{
    const d=new Date().toLocaleDateString("ar-EG",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    let m=`🐣 *طلبية كتاكيت — مجموعة المودة*\n${"━".repeat(28)}\n📅 *التاريخ:* ${d}\n\n📦 *تفاصيل الطلبية:*\n\n`;
    sorted.forEach(([id,n])=>{const b=gb(id);m+=`${b.e} ${b.name}: *${fmt(n)} ${b.unit}*\n`;});
    m+=`\n${"━".repeat(28)}\n📊 *إجمالي الطلبية: ${fmt(total)} طير*\n${"━".repeat(28)}\n\nنرجو التكرم بالتجهيز في أقرب وقت 🙏\n*مجموعة المودة*`;
    return m;
  };
  const sendWA=()=>{
    if(!supplierPhone){alert("أضف رقم المورد في الإعدادات أولاً");return;}
    const p=supplierPhone.replace(/[^0-9]/g,"");
    const ip=p.startsWith("0")?"2"+p:p.startsWith("2")?p:"2"+p;
    window.open(`https://wa.me/${ip}?text=${encodeURIComponent(buildMsg())}`,"_blank");
    setSent(true);setTimeout(()=>setSent(false),4000);
  };

    <div style={{padding:14}}>
      <div style={{background:"linear-gradient(135deg,#075E54,#128C7E)",borderRadius:18,padding:"17px 18px",marginBottom:14,color:"#fff",boxShadow:"0 6px 18px rgba(7,94,84,.35)"}}>

        <div style={{fontSize:32,fontWeight:900}}>{fmt(total)} طير</div>
        <div style={{fontSize:12,opacity:.8}}>{sorted.length} صنف</div>

      </div>
      <Card ch={<>
        <div style={{fontWeight:800,fontSize:14,color:C.pr,marginBottom:12}}>📋 تفاصيل الطلبية</div>
        {sorted.map(([id,n],i)=>{const b=gb(id);const pct=Math.round(n/total*100);return(
          <div key={id} style={{marginBottom:i<sorted.length-1?14:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}><div style={{width:40,height:40,borderRadius:11,background:b.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>{b.e}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:C.txt}}>{b.name}</div><div style={{fontSize:10,color:C.muted}}>{pct}%</div></div><div style={{fontWeight:900,fontSize:20,color:b.brd}}>{fmt(n)}</div></div>
            <div style={{height:5,background:C.pr6,borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:b.brd,borderRadius:99}}/></div>
          </div>

          <span style={{fontWeight:800,fontSize:14,color:C.pr}}>📦 الإجمالي</span>

        </div>
      </>} style={{marginBottom:12}}/>
      <Card ch={<>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>👁️ معاينة الرسالة</div>

/* ══ CALCULATOR ══ */
const CalcTab=()=>{
  const [disp,setDisp]=useState("0");const [expr,setExpr]=useState("");const [jc,setJc]=useState(false);
  const press=v=>{
    if(v==="C"){setDisp("0");setExpr("");setJc(false);return;}
    if(v==="⌫"){if(jc){setDisp("0");setExpr("");setJc(false);return;}setDisp(disp.length>1?disp.slice(0,-1):"0");return;}
    if(v==="="){try{const r=Function('"use strict";return ('+disp.replace(/÷/g,"/").replace(/×/g,"*")+')')();setExpr(disp+" =");setDisp(String(Math.round(r*1e6)/1e6));setJc(true);}catch{setDisp("خطأ");setJc(true);}return;}
    if(v==="%"){try{setDisp(String(Function('"use strict";return ('+disp+'/100)')()));setJc(true);}catch{setDisp("خطأ");}return;}
    if(jc&&!["+","-","×","÷"].includes(v)){setDisp(v==="."?"0.":v);setExpr("");setJc(false);}
    else{if(jc)setJc(false);setDisp(disp==="0"&&![".","+","-","×","÷"].includes(v)?v:disp==="خطأ"?v:disp+v);}
  };
  const rows=[[["C","#FF3B30","#fff"],["±",C.bdr2,C.txt],["%",C.bdr2,C.txt],["÷","#FF9500","#fff"]],[["7",C.card,C.txt],["8",C.card,C.txt],["9",C.card,C.txt],["×","#FF9500","#fff"]],[["4",C.card,C.txt],["5",C.card,C.txt],["6",C.card,C.txt],["-","#FF9500","#fff"]],[["1",C.card,C.txt],["2",C.card,C.txt],["3",C.card,C.txt],["+","#FF9500","#fff"]],[["⌫",C.bdr2,C.txt],["0",C.card,C.txt],[".",C.card,C.txt],["=",C.pr,"#fff"]]];
  const d=disp.length>12?disp.slice(0,12)+"…":disp;
  return(
    <div style={{padding:14,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.card,borderRadius:18,padding:"18px 20px",boxShadow:C.cSh,minHeight:110,border:`1px solid ${C.cBd}`}}>
        <div style={{fontSize:12,color:C.muted,minHeight:18,textAlign:"left",direction:"ltr"}}>{expr}</div>
        <div style={{fontSize:d.length>9?30:40,fontWeight:900,color:C.txt,textAlign:"left",direction:"ltr",lineHeight:1.2,marginTop:8,wordBreak:"break-all"}}>{d}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {rows.flat().map(([l,bg,tc],i)=><button key={i} className="calc-btn" onClick={()=>press(l)} style={{background:bg,color:tc,boxShadow:"0 3px 8px rgba(0,0,0,.12)",fontSize:l==="⌫"?18:22}}>{l}</button>)}
      </div>
      <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>💡 مخصص لحسابات الفراخ — السعر × الكمية</div>
    </div>
  );
};

/* ══ ROOT APP ══ */
function App(){
  const [rdy,setRdy]=useState(false);
  const [auth,setAuth]=useState(false);
  const [spw,setSpw]=useState("1234");
  const [pwEnabled,setPwEnabled]=useState(false);
  const [orders,setOrders]=useState([]);
  const [prices,setPrices]=useState({});
  const [priceDate,setPriceDate]=useState(today());
  const [supPhone,setSupPhone]=useState("");
  const [customBirds,setCustomBirds]=useState(null);
  const [tab,setTab]=useState("home");
  const [booking,setBooking]=useState(null);
  const [profile,setProfile]=useState(null);
  const [dark,setDark]=useState(()=>{try{return localStorage.getItem('mwdark')==='1';}catch{return false;}});
  const [syncState,setSyncState]=useState("loading");
  const [syncTime,setSyncTime]=useState("");

  if(customBirds&&customBirds.length>0)BIRDS=customBirds;else BIRDS=[...DEFAULT_BIRDS];
  Object.assign(C,dark?DARK:LIGHT);

  useEffect(()=>{document.body.classList.toggle('dark',dark);try{localStorage.setItem('mwdark',dark?'1':'0');}catch{}},[dark]);

  /* Back button fix */
  useEffect(()=>{
    history.pushState({p:"app"},""," ");
    const fn=()=>{
      history.pushState({p:"app"},""," ");
      if(profile){setProfile(null);return;}
      if(booking){setBooking(null);return;}
      if(tab!=="home"){setTab("home");}
    };
    window.addEventListener("popstate",fn);
    return()=>window.removeEventListener("popstate",fn);
  },[profile,booking,tab]);

  /* Load */
  useEffect(()=>{
    setSyncState("loading");
    loadCloud().then(raw=>{
      const d=checkPriceReset(raw);
      if(d){
        if(d.pw)setSpw(d.pw);
        if(typeof d.pwEnabled!=="undefined")setPwEnabled(d.pwEnabled);
        if(d.orders)setOrders(autoClean(d.orders));
        if(d.prices)setPrices(d.prices);
        if(d.priceDate)setPriceDate(d.priceDate);
        if(d.supPhone)setSupPhone(d.supPhone);
        if(d.customBirds)setCustomBirds(d.customBirds);
      }
      setSyncState("ok");setRdy(true);
    }).catch(()=>{setSyncState("offline");setRdy(true);});
  },[]);

  useEffect(()=>{if(rdy&&!pwEnabled)setAuth(true);},[rdy,pwEnabled]);

  const mkD=(o,p,pd,sp,pw,pwe,cb)=>({pw,pwEnabled:pwe,orders:o,prices:p,priceDate:pd,supPhone:sp,customBirds:cb||customBirds});
  const cloud=(d)=>{const t=new Date().toLocaleTimeString("ar-EG");saveCloud(d,st=>{setSyncState(st);if(st==="saved")setSyncTime(t);});};
  const sv=useCallback((o,p=prices,pd=priceDate,sp=supPhone,pw=spw,pwe=pwEnabled,cb=customBirds)=>{setOrders(o);cloud(mkD(o,p,pd,sp,pw,pwe,cb));},[prices,priceDate,supPhone,spw,pwEnabled,customBirds]);

  const svPw=np=>{setSpw(np);cloud(mkD(orders,prices,priceDate,supPhone,np,pwEnabled));};
  const svPwE=pwe=>{setPwEnabled(pwe);cloud(mkD(orders,prices,priceDate,supPhone,spw,pwe));};
  const svPrices=p=>{setPrices(p);const pd=today();setPriceDate(pd);cloud(mkD(orders,p,pd,supPhone,spw,pwEnabled));};
  const svSup=sp=>{setSupPhone(sp);cloud(mkD(orders,prices,priceDate,sp,spw,pwEnabled));};
  const svBirds=cb=>{setCustomBirds(cb);BIRDS=cb;cloud(mkD(orders,prices,priceDate,supPhone,spw,pwEnabled,cb));};

  const hSave=o=>{const ex=orders.find(x=>x.id===o.id);sv(ex?orders.map(x=>x.id===o.id?o:x):[...orders,o]);setBooking(null);};
  const hDeliver=id=>sv(orders.map(o=>o.id!==id?o:{...o,status:"active",delivDate:o.delivDate||now()}));
  const hDelete=id=>sv(orders.filter(o=>o.id!==id));
  const hFu=(id,note)=>sv(orders.map(o=>o.id!==id?o:{...o,fus:[...(o.fus||[]),{date:now(),note}]}));
  const hDone=id=>sv(orders.map(o=>o.id!==id?o:{...o,status:"done"}));

  const ovCnt=orders.filter(o=>{if(o.status!=="active")return false;const l=o.fus?.length?o.fus.at(-1).date:o.delivDate;return dSince(l)>=10;}).length;
  const pendCnt=orders.filter(o=>o.status==="pending").length;
  const actCnt=orders.filter(o=>o.status==="active").length;

  if(!rdy)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#020E08,#064E3B,#075E54)",gap:16}}>
      <div className="fl" style={{fontSize:72,filter:"drop-shadow(0 6px 16px rgba(37,211,102,.3))"}}>🐥</div>
      <div style={{color:"rgba(255,255,255,.65)",fontSize:15,fontWeight:700,fontFamily:"Cairo,sans-serif"}}>جاري تحميل البيانات...</div>
      <div style={{color:"rgba(255,255,255,.35)",fontSize:12,fontFamily:"Cairo,sans-serif"}}>☁️ Firebase</div>
    </div>
  );
  if(!auth&&pwEnabled)return<Login onLogin={()=>setAuth(true)} pw={spw}/>;
  if(!auth)return null;

  const TABS=[{id:"home",lbl:"الحجوزات",ico:"🏠",badge:pendCnt},{id:"followup",lbl:"متابعة",ico:"📞",badge:ovCnt,red:true},{id:"stats",lbl:"إحصائيات",ico:"📊"},{id:"prices",lbl:"الأسعار",ico:"💰"},{id:"supplier",lbl:"المورد",ico:"📦"},{id:"calc",lbl:"حاسبة",ico:"🔢"},{id:"settings",lbl:"إعدادات",ico:"⚙️"}];
  const curProfile=profile?orders.find(o=>o.id===profile.id)||null:null;

  return(
    <div style={{fontFamily:"Cairo,sans-serif",direction:"rtl",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",transition:"background .3s",position:"relative"}}>
      {/* HEADER */}
      <div style={{background:C.hdr,padding:"12px 14px 10px",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 12px rgba(0,0,0,.22)"}}>
        <div style={{fontSize:10,color:"rgba(255,255,255,.45)",marginBottom:1}}>{fmtL(now())}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"Tajawal,Cairo,sans-serif",fontSize:20,fontWeight:900,color:"#fff"}}>🐥 مجموعة المودة</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{background:"rgba(255,255,255,.12)",borderRadius:99,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
              <span className={syncState==="saving"||syncState==="loading"?"pls":""} style={{fontSize:11}}>{syncState==="ok"||syncState==="saved"?"☁️":syncState==="offline"?"📵":"⏳"}</span>
              <span style={{fontSize:10,color:"rgba(255,255,255,.8)",fontWeight:600}}>{pendCnt} حجز</span>
            </div>
            {actCnt>0&&<div style={{background:"rgba(37,211,102,.22)",borderRadius:99,padding:"4px 9px"}}><span style={{fontSize:10,color:"#86EFAC",fontWeight:700}}>{actCnt} 📞</span></div>}
            <button onClick={()=>setDark(d=>!d)} className="abtn" style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.18)",color:"#fff",fontSize:15}}>{dark?"☀️":"🌙"}</button>
          </div>
        </div>
      </div>
      {/* CONTENT */}
      <div style={{paddingBottom:90}}>
        {tab==="home"    &&<HomeTab orders={orders} onDeliver={hDeliver} onViewCustomer={setProfile} prices={prices}/>}
        {tab==="followup"&&<FollowupTab orders={orders} onFu={hFu} onDone={hDone} onDelete={hDelete} prices={prices} onViewCustomer={setProfile}/>}
        {tab==="stats"   &&<StatsTab orders={orders} prices={prices}/>}
        {tab==="prices"  &&<PricesTab prices={prices} onSave={svPrices}/>}
        {tab==="supplier"&&<SupplierTab orders={orders} supplierPhone={supPhone}/>}
        {tab==="calc"    &&<CalcTab/>}
        {tab==="settings"&&<SettingsTab spw={spw} pwEnabled={pwEnabled} onChangePw={svPw} onTogglePw={()=>svPwE(!pwEnabled)} onLogout={()=>{setAuth(false);setPwEnabled(true);}} total={orders.length} supplierPhone={supPhone} onChangeSup={svSup} dark={dark} onToggleDark={()=>setDark(d=>!d)} syncState={syncState} syncTime={syncTime} birds={BIRDS} onSaveBirds={svBirds}/>}
      </div>
      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.nav,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",display:"flex",zIndex:100,boxShadow:C.nSh,paddingBottom:"env(safe-area-inset-bottom,0)"}}>
        <button className="nav-btn" onClick={()=>setBooking("new")} style={{flex:"0 0 13%"}}>
          <div className="gl" style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#25D366,#128C7E)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,color:"#fff",boxShadow:"0 3px 14px rgba(37,211,102,.55)",marginBottom:2}}>＋</div>
          <span style={{fontSize:9,color:C.navA,fontWeight:700}}>حجز</span>
        </button>
        {TABS.map(t=>{const a=tab===t.id;return(
          <button key={t.id} className="nav-btn" onClick={()=>setTab(t.id)} style={{flex:1}}>
            {a&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:32,height:3,background:C.pr3,borderRadius:"0 0 5px 5px"}}/>}
            <span style={{fontSize:a?26:22,transition:"font-size .15s",lineHeight:1}}>{t.ico}</span>
            <span style={{fontSize:9,color:a?C.navA:C.navI,fontWeight:a?800:500,transition:"color .15s",marginTop:2}}>{t.lbl}</span>
            {t.badge>0&&<span style={{position:"absolute",top:5,right:"calc(50% - 20px)",background:t.red?C.red:C.pr3,color:"#fff",borderRadius:99,padding:"1px 5px",fontSize:9,fontWeight:900,minWidth:16,textAlign:"center"}}>{t.badge}</span>}
          </button>
        );})}
      </nav>
      {booking&&<BookSheet edit={booking==="new"?null:booking} onClose={()=>setBooking(null)} onSave={hSave} prices={prices}/>}
      {curProfile&&(
        <div style={{position:"fixed",inset:0,zIndex:150,maxWidth:480,margin:"0 auto"}}>
          <CustomerProfile order={curProfile} onClose={()=>setProfile(null)} onDelete={id=>{hDelete(id);setProfile(null);}} onEdit={o=>{setBooking(o);setProfile(null);}} onDeliver={id=>{hDeliver(id);setProfile(null);}} prices={prices}/>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
